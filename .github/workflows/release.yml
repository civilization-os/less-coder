name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      publish_registry:
        description: "Publish to PyPI/npm (requires secrets)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: write
  id-token: write

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install test deps
        run: |
          python -m pip install --upgrade pip
          pip install pytest

      - name: Validate Tag and Package Versions
        env:
          GITHUB_REF: ${{ github.ref }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          PUBLISH_REGISTRY: ${{ github.event.inputs.publish_registry || 'false' }}
        run: |
          python - <<'PY'
          import json
          import re
          import tomllib
          from pathlib import Path
          import os

          pyproject = tomllib.loads(Path("pyproject.toml").read_text(encoding="utf-8"))
          package = json.loads(Path("package.json").read_text(encoding="utf-8"))
          py_adapter = tomllib.loads(
              Path("packaging/python/lesscoder_adapter_win_x64/pyproject.toml").read_text(encoding="utf-8")
          )
          npm_adapter = json.loads(Path("npm/adapter-win32-x64/package.json").read_text(encoding="utf-8"))

          py_ver = str(pyproject.get("project", {}).get("version", "")).strip()
          npm_ver = str(package.get("version", "")).strip()
          py_adapter_ver = str(py_adapter.get("project", {}).get("version", "")).strip()
          npm_adapter_ver = str(npm_adapter.get("version", "")).strip()
          npm_optional_adapter_ver = str(
              package.get("optionalDependencies", {}).get("@civilization/lesscoder-adapter-win32-x64", "")
          ).strip()
          if not py_ver or not npm_ver or not py_adapter_ver or not npm_adapter_ver or not npm_optional_adapter_ver:
              raise SystemExit("Missing version in one or more package manifests")
          versions = {py_ver, npm_ver, py_adapter_ver, npm_adapter_ver, npm_optional_adapter_ver}
          if len(versions) != 1:
              raise SystemExit(
                  "Version mismatch across packages: "
                  f"py={py_ver}, npm={npm_ver}, py_adapter={py_adapter_ver}, "
                  f"npm_adapter={npm_adapter_ver}, npm_optional_adapter={npm_optional_adapter_ver}"
              )

          ref = os.environ.get("GITHUB_REF", "")
          if ref.startswith("refs/tags/"):
              tag = ref.rsplit("/", 1)[-1]
              if not re.fullmatch(r"v\d+\.\d+\.\d+", tag):
                  raise SystemExit(f"Invalid tag format: {tag} (expected vMAJOR.MINOR.PATCH)")
              expected = tag[1:]
              if expected != py_ver:
                  raise SystemExit(
                      "Tag/version mismatch: "
                      f"tag={tag}, pyproject={py_ver}, package.json={npm_ver}, "
                      f"py_adapter={py_adapter_ver}, npm_adapter={npm_adapter_ver}, "
                      f"npm_optional_adapter={npm_optional_adapter_ver}"
                  )

          print(f"Version gate passed: {py_ver}")
          PY

      - name: Run integration tests
        run: |
          pytest -q tests/integration

  build-python:
    needs:
      - verify
      - build-rust-adapter
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Download Windows adapter artifact
        uses: actions/download-artifact@v4
        with:
          name: alsp-adapter-windows
          path: adapter-artifacts/windows

      - name: Prepare Python adapter package binary
        run: |
          mkdir -p packaging/python/lesscoder_adapter_win_x64/src/lesscoder_adapter_win_x64/bin
          cp "adapter-artifacts/windows/alsp_adapter_windows_x86_64.exe" \
             "packaging/python/lesscoder_adapter_win_x64/src/lesscoder_adapter_win_x64/bin/alsp_adapter.exe"

      - name: Build Python distributions
        run: |
          python -m pip install --upgrade pip
          pip install build
          python -m build
          python -m build packaging/python/lesscoder_adapter_win_x64

      - name: Upload python main dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-main-dist
          path: dist/lesscoder-*

      - name: Upload python adapter dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-adapter-dist
          path: packaging/python/lesscoder_adapter_win_x64/dist/*

  build-npm:
    needs:
      - verify
      - build-rust-adapter
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Download Windows adapter artifact
        uses: actions/download-artifact@v4
        with:
          name: alsp-adapter-windows
          path: adapter-artifacts/windows

      - name: Prepare npm adapter package binary
        run: |
          mkdir -p npm/adapter-win32-x64/bin
          cp "adapter-artifacts/windows/alsp_adapter_windows_x86_64.exe" \
             "npm/adapter-win32-x64/bin/alsp_adapter.exe"

      - name: Pack npm tarballs
        run: |
          npm pack
          cd npm/adapter-win32-x64
          npm pack

      - name: Upload npm tarball artifact
        uses: actions/upload-artifact@v4
        with:
          name: npm-tarball
          path: |
            *.tgz
            npm/adapter-win32-x64/*.tgz

  build-rust-adapter:
    needs: verify
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: alsp-adapter-linux
            binary_path: engine/rust/alsp_adapter/target/release/alsp_adapter
            output_name: alsp_adapter_linux_x86_64
          - os: windows-latest
            artifact_name: alsp-adapter-windows
            binary_path: engine/rust/alsp_adapter/target/release/alsp_adapter.exe
            output_name: alsp_adapter_windows_x86_64.exe
          - os: macos-latest
            artifact_name: alsp-adapter-macos
            binary_path: engine/rust/alsp_adapter/target/release/alsp_adapter
            output_name: alsp_adapter_macos_x86_64
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build release binary
        run: |
          cargo build --release --manifest-path engine/rust/alsp_adapter/Cargo.toml --bin alsp_adapter

      - name: Prepare adapter asset (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p release-assets
          cp "${{ matrix.binary_path }}" "release-assets/${{ matrix.output_name }}"
          sha256sum "release-assets/${{ matrix.output_name }}" > "release-assets/${{ matrix.output_name }}.sha256"

      - name: Prepare adapter asset (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release-assets | Out-Null
          Copy-Item "${{ matrix.binary_path }}" "release-assets/${{ matrix.output_name }}"
          $hash = (Get-FileHash "release-assets/${{ matrix.output_name }}" -Algorithm SHA256).Hash.ToLower()
          "$hash  ${{ matrix.output_name }}" | Out-File -FilePath "release-assets/${{ matrix.output_name }}.sha256" -Encoding ascii

      - name: Upload adapter artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: release-assets/*

  github-release:
    needs:
      - build-python
      - build-npm
      - build-rust-adapter
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Generate adapter manifest
        run: |
          python - <<'PY'
          import hashlib, json
          from pathlib import Path

          root = Path("release-assets")
          targets = {
              "alsp_adapter_windows_x86_64.exe",
              "alsp_adapter_linux_x86_64",
              "alsp_adapter_macos_x86_64",
          }
          assets = []
          for p in root.rglob("*"):
              if not p.is_file():
                  continue
              if p.name not in targets:
                  continue
              h = hashlib.sha256()
              with p.open("rb") as f:
                  while True:
                      b = f.read(8192)
                      if not b:
                          break
                      h.update(b)
              assets.append({
                  "name": p.name,
                  "sha256": h.hexdigest(),
                  "size": p.stat().st_size,
              })
          manifest = {
              "version": 1,
              "assets": sorted(assets, key=lambda x: x["name"]),
          }
          out = root / "lesscoder_adapter_manifest.json"
          out.write_text(json.dumps(manifest, indent=2), encoding="utf-8")
          print(out)
          PY

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/**/*
          generate_release_notes: true

  publish-pypi:
    needs: build-python
    if: |
      startsWith(github.ref, 'refs/tags/v') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.publish_registry == 'true')
    runs-on: ubuntu-latest
    environment:
      name: pypi
    env:
      HAS_PYPI_TOKEN: ${{ secrets.PYPI_API_TOKEN != '' }}
    steps:
      - name: Download python main dist artifact
        uses: actions/download-artifact@v4
        with:
          name: python-main-dist
          path: dist

      - name: Download python adapter dist artifact
        uses: actions/download-artifact@v4
        with:
          name: python-adapter-dist
          path: dist

      - name: Publish to PyPI
        if: ${{ env.HAS_PYPI_TOKEN == 'true' }}
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}

      - name: Skip PyPI publish (missing secret)
        if: ${{ env.HAS_PYPI_TOKEN != 'true' }}
        run: echo "PYPI_API_TOKEN not configured; skipping PyPI publish."

  publish-npm:
    needs: build-npm
    if: |
      startsWith(github.ref, 'refs/tags/v') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.publish_registry == 'true')
    runs-on: ubuntu-latest
    env:
      HAS_NPM_TOKEN: ${{ secrets.NPM_TOKEN != '' }}
    steps:
      - name: Download npm artifact
        uses: actions/download-artifact@v4
        with:
          name: npm-tarball
          path: npm-dist

      - name: Setup Node for npm publish
        if: ${{ env.HAS_NPM_TOKEN == 'true' }}
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Publish to npm
        if: ${{ env.HAS_NPM_TOKEN == 'true' }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          ADAPTER_TARBALL=$(ls ./npm-dist/*lesscoder-adapter-win32-x64*.tgz | head -n 1)
          MAIN_TARBALL=$(ls ./npm-dist/*lesscoder*.tgz | grep -v lesscoder-adapter-win32-x64 | head -n 1)
          if [ -z "$ADAPTER_TARBALL" ]; then
            echo "Adapter npm tarball not found under ./npm-dist"
            exit 1
          fi
          if [ -z "$MAIN_TARBALL" ]; then
            echo "Main npm tarball not found under ./npm-dist"
            exit 1
          fi
          npm publish "$ADAPTER_TARBALL" --access public
          npm publish "$MAIN_TARBALL" --access public

      - name: Skip npm publish (missing secret)
        if: ${{ env.HAS_NPM_TOKEN != 'true' }}
        run: echo "NPM_TOKEN not configured; skipping npm publish."
