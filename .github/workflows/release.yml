name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      publish_registry:
        description: "Publish to PyPI/npm (requires secrets)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: write
  id-token: write

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install test deps
        run: |
          python -m pip install --upgrade pip
          pip install pytest

      - name: Run integration tests
        run: |
          pytest -q tests/integration

  build-python:
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build Python distributions
        run: |
          python -m pip install --upgrade pip
          pip install build
          python -m build

      - name: Upload python dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: dist/*

  build-npm:
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Pack npm tarball
        run: |
          npm pack

      - name: Upload npm tarball artifact
        uses: actions/upload-artifact@v4
        with:
          name: npm-tarball
          path: "*.tgz"

  build-rust-adapter:
    needs: verify
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: alsp-adapter-linux
            binary_path: engine/rust/alsp_adapter/target/release/alsp_adapter
          - os: windows-latest
            artifact_name: alsp-adapter-windows
            binary_path: engine/rust/alsp_adapter/target/release/alsp_adapter.exe
          - os: macos-latest
            artifact_name: alsp-adapter-macos
            binary_path: engine/rust/alsp_adapter/target/release/alsp_adapter
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build release binary
        run: |
          cargo build --release --manifest-path engine/rust/alsp_adapter/Cargo.toml --bin alsp_adapter

      - name: Upload adapter artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.binary_path }}

  github-release:
    needs:
      - build-python
      - build-npm
      - build-rust-adapter
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/**/*
          generate_release_notes: true

  publish-pypi:
    needs: build-python
    if: |
      startsWith(github.ref, 'refs/tags/v') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.publish_registry == 'true')
    runs-on: ubuntu-latest
    environment:
      name: pypi
    steps:
      - name: Download python dist artifact
        uses: actions/download-artifact@v4
        with:
          name: python-dist
          path: dist

      - name: Publish to PyPI
        if: ${{ secrets.PYPI_API_TOKEN != '' }}
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}

      - name: Skip PyPI publish (missing secret)
        if: ${{ secrets.PYPI_API_TOKEN == '' }}
        run: echo "PYPI_API_TOKEN not configured; skipping PyPI publish."

  publish-npm:
    needs: build-npm
    if: |
      startsWith(github.ref, 'refs/tags/v') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.publish_registry == 'true')
    runs-on: ubuntu-latest
    steps:
      - name: Download npm artifact
        uses: actions/download-artifact@v4
        with:
          name: npm-tarball
          path: npm-dist

      - name: Setup Node for npm publish
        if: ${{ secrets.NPM_TOKEN != '' }}
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Publish to npm
        if: ${{ secrets.NPM_TOKEN != '' }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          npm publish npm-dist/*.tgz --access public

      - name: Skip npm publish (missing secret)
        if: ${{ secrets.NPM_TOKEN == '' }}
        run: echo "NPM_TOKEN not configured; skipping npm publish."
